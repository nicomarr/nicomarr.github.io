# Refresh _data/articles-metadata.csv on a schedule by calling OpenAlex.
#
# Prerequisites:
#   1. Repo secret OPENALEX_EMAIL set to the email sent to OpenAlex's
#      "polite pool" (any address you control). Settings -> Secrets and
#      variables -> Actions -> New repository secret.
#   2. _data/ contains articles-metadata.csv, update-log.json, and
#      PMID-export.txt. The PMID file is only required for the
#      --append-metadata and --update-and-append modes.
#
# Deployment model: this action commits any data changes to master.
# The live site is served from the gh-pages branch, so updates only
# become public after you run `git push origin master:gh-pages`
# locally. This is intentional — it preserves master as a staging
# branch you can preview with `bundle exec jekyll serve` before
# deploying.

name: Update publications metadata

on:
  workflow_dispatch:        # manual trigger from the Actions tab
  schedule:
    - cron: "0 6 * * 1"     # every Monday at 06:00 UTC — adjust as desired

permissions:
  contents: write           # needed by the commit-and-push step

# Prevent overlapping runs (manual + scheduled) from racing on the same files
concurrency:
  group: update-publications-metadata
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # openalex_api_lite + website_utils + main.py only need these.
          # ipython is required because openalex_api_lite.py imports
          # IPython.display at module level (used by list_works in notebooks).
          pip install httpx tqdm pandas ipython

      - name: Verify EMAIL secret is set
        env:
          EMAIL: ${{ secrets.OPENALEX_EMAIL }}
        run: |
          if [[ -z "$EMAIL" ]]; then
            echo "::error::OPENALEX_EMAIL secret is not set in this repo."
            exit 1
          fi

      - name: Run metadata update
        env:
          EMAIL: ${{ secrets.OPENALEX_EMAIL }}
        run: python _py/utils/main.py --update-and-append _data

      - name: Commit changes to master
        run: |
          if [[ -n "$(git status --porcelain _data)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _data
            git commit -m "chore: refresh publications metadata"
            git push
          else
            echo "No metadata changes to commit."
          fi
